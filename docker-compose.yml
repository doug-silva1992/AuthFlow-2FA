services:
  authflow-2fa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: authflow-2fa
    ports:
      - "8080:80"
    volumes:
      - ./php-api:/var/www/html
    environment:
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: authflow
      DB_USERNAME: authflow_user
      DB_PASSWORD: authflow_pass
    depends_on:
      - mysql
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    container_name: authflow-mysql
    environment:
      MYSQL_DATABASE: authflow
      MYSQL_USER: authflow_user
      MYSQL_PASSWORD: authflow_pass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data:
